<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoVaX RP | الدستور</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #8a2be2; --bg: #050505; --card: #0d0d0d; --text: #fff; --dim: #a0a0a0; --discord: #5865F2; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; }

        /* Navbar */
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; }
        .logo { font-family: 'Orbitron'; color: var(--p); font-size: 1.5rem; font-weight: 900; }
        .login-btn { background: var(--discord); color: #fff; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: 800; font-size: 0.8rem; }

        /* الأزرار السريعة للموبايل (حل المشكلة) */
        .mobile-nav { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #080808; margin-top: 80px; border-bottom: 1px solid #1a1a1a; }
        .m-btn { background: #151515; color: var(--dim); border: 1px solid #222; padding: 10px; border-radius: 8px; flex: 1; text-align: center; font-size: 0.9rem; font-weight: 700; cursor: pointer; }
        .m-btn.active { background: rgba(138, 43, 226, 0.2); color: #fff; border-color: var(--p); }

        /* Sidebar (للكومبيوتر) */
        .sidebar { position: fixed; right: 0; top: 70px; width: 250px; height: 100%; background: #080808; border-left: 1px solid #1a1a1a; padding: 20px; display: block; }

        /* Main */
        main { margin-right: 250px; padding: 20px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }

        /* المربع الذكي للقوانين */
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 20px; border-radius: 12px; margin-top: 10px; }
        .select-box { width: 100%; padding: 12px; background: #111; border: 1px solid var(--p); color: #fff; border-radius: 8px; font-family: 'Tajawal'; margin-bottom: 15px; }
        .view-area { background: #000; border: 1px solid #1a1a1a; padding: 20px; border-radius: 8px; line-height: 1.8; color: var(--dim); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* تعديلات الموبايل */
        @media (max-width: 992px) {
            .sidebar { display: none; } /* نخفي القائمة الجانبية بالموبايل */
            main { margin-right: 0; padding: 15px; }
            .mobile-nav { display: flex; } /* نظهر الأزرار العلوية بدالها */
        }
        @media (min-width: 993px) { .mobile-nav { display: none; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">NoVaX</div>
        <a href="#" class="login-btn"><i class="fa-brands fa-discord"></i> دخول</a>
    </nav>

    <div class="mobile-nav">
        <div class="m-btn active" onclick="tab('home', this)">الرئيسية</div>
        <div class="m-btn" onclick="tab('rules', this)">الدستور</div>
        <div class="m-btn" onclick="tab('apply', this)">التقديم</div>
    </div>

    <aside class="sidebar">
        <div class="nav-item" onclick="tab('home', this)" style="cursor:pointer; padding:15px; color:var(--p);">الرئيسية</div>
        <div class="nav-item" onclick="tab('rules', this)" style="cursor:pointer; padding:15px;">الدستور</div>
        <div class="nav-item" onclick="tab('apply', this)" style="cursor:pointer; padding:15px;">التقديم</div>
    </aside>

    <main>
        <div id="home" class="page active">
            <div class="card" style="text-align:center;">
                <h1 style="color:var(--p);">NoVaX RP</h1>
                <p>مرحباً بك في لوحة تحكم المواطن.</p>
            </div>
        </div>

        <div id="rules" class="page">
            <div class="card">
                <h3>اختر القسم:</h3>
                <select class="select-box" onchange="loadRules(this.value)">
                    <option value="">-- اضغط هنا للاختيار --</option>
                    <option value="1">القوانين العامة</option>
                    <option value="2">قوانين السطو</option>
                    <option value="3">الممنوعات</option>
                </select>
                <div id="rules-view" class="view-area">اختر من المربع أعلاه...</div>
            </div>
        </div>

        <div id="apply" class="page">
            <div class="card">
                <h3>تقديم وظيفي</h3>
                <input type="text" placeholder="الاسم.." style="width:100%; padding:10px; margin:10px 0; background:#111; border:1px solid #333; color:#fff;">
                <button style="width:100%; padding:10px; background:var(--p); border:none; color:#fff; font-weight:bold; border-radius:8px;">إرسال</button>
            </div>
        </div>
    </main>

    <script>
        function tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
            if(btn.classList.contains('m-btn')) btn.classList.add('active');
        }

        function loadRules(v) {
            const area = document.getElementById('rules-view');
            if(v=="1") area.innerHTML = "• NLR: 15 دقيقة.<br>• RDM: ممنوع القتل عشوائي.";
            else if(v=="2") area.innerHTML = "• بنك مركزي: 4 شرطة.<br>• سوبر ماركت: 2 شرطة.";
            else if(v=="3") area.innerHTML = "• ممنوع السب (OOC).<br>• ممنوع استخدام الماكرو.";
            else area.innerHTML = "اختر من المربع أعلاه...";
        }
    </script>
</body>
</html>
