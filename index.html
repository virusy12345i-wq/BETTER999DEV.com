<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoVaX RP | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #8a2be2; --bg: #050505; --card: #0d0d0d; --border: #1a1a1a; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* الهيدر العلوي */
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 900; color: var(--p); letter-spacing: 1px; }
        .login-btn { background: #5865F2; color: #fff; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 13px; }

        /* شريط التنقل (شغال 100% موبايل/كمبيوتر) */
        .tabs-bar { display: flex; background: #0a0a0a; margin-top: 70px; border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 70px; z-index: 999; }
        .tab-item { flex: 1; min-width: 100px; padding: 15px; text-align: center; cursor: pointer; color: #666; font-weight: 800; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-item.active { color: var(--p); border-bottom-color: var(--p); background: rgba(138,43,226,0.05); }

        /* المحتوى */
        main { padding: 20px; max-width: 1000px; margin: 0 auto; min-height: 80vh; }
        .page { display: none; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }

        /* نظام المربع للقوانين */
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .select-engine { width: 100%; padding: 15px; background: #111; border: 1px solid var(--p); color: #fff; border-radius: 10px; font-size: 16px; margin-bottom: 20px; cursor: pointer; }
        .display-area { background: #000; padding: 25px; border-radius: 10px; border: 1px dashed #333; line-height: 1.8; color: #bbb; min-height: 150px; }
        .display-area b { color: var(--p); font-size: 18px; display: block; margin-bottom: 10px; }

        /* نظام التقديم */
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: var(--p); font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; background: #151515; border: 1px solid #222; color: #fff; border-radius: 8px; }
        .submit-btn { width: 100%; padding: 15px; background: var(--p); border: none; color: #fff; font-weight: 900; border-radius: 10px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .submit-btn:hover { background: #ac15fe; box-shadow: 0 0 20px rgba(138, 43, 226, 0.4); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">NoVaX RP</div>
        <a href="#" class="login-btn"><i class="fa-brands fa-discord"></i> دخول</a>
    </nav>

    <div class="tabs-bar">
        <div class="tab-item active" onclick="switchPage('home', this)">الرئيسية</div>
        <div class="tab-item" onclick="switchPage('rules', this)">الدستور</div>
        <div class="tab-item" onclick="switchPage('apply', this)">التقديم</div>
    </div>

    <main>
        <div id="home" class="page active">
            <div class="card" style="text-align:center; padding: 50px 20px;">
                <h1 style="font-size: 35px; color: var(--p); margin-bottom: 15px;">WELCOME</h1>
                <p style="color:#888;">أهلاً بك في بوابة مدينة NoVaX الرسمية. راجع القوانين وقدم على الوظائف من هنا.</p>
            </div>
        </div>

        <div id="rules" class="page">
            <div class="card">
                <h2 style="margin-bottom: 20px; border-right: 4px solid var(--p); padding-right: 15px;">دستور المدينة</h2>
                <select class="select-engine" onchange="loadData(this.value)">
                    <option value="">-- اضغط هنا لاختيار القسم --</option>
                    <option value="999">قوانين العساكر (999)</option>
                    <option value="gang">قوانين الإجرام (Gangs)</option>
                    <option value="basic">القوانين العامة (Basic)</option>
                </select>
                <div id="rule-box" class="display-area">
                    يرجى اختيار قسم من المربع أعلاه لعرض القوانين بالتفصيل...
                </div>
            </div>
        </div>

        <div id="apply" class="page">
            <div class="card">
                <h2 style="margin-bottom: 20px; border-right: 4px solid var(--p); padding-right: 15px;">طلب انضمام</h2>
                <div class="input-group">
                    <label>الاسم الرباعي (IC):</label>
                    <input type="text" placeholder="مثال: علي محمد">
                </div>
                <div class="input-group">
                    <label>الرتبة/الوظيفة المطلوبة:</label>
                    <input type="text" placeholder="مثال: شرطي أو طبيب">
                </div>
                <div class="input-group">
                    <label>لماذا تريد الانضمام؟</label>
                    <textarea rows="4" placeholder="اكتب طموحاتك هنا..."></textarea>
                </div>
                <button class="submit-btn">إرسال البيانات فوراً</button>
            </div>
        </div>
    </main>

    <script>
        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
        }

        function loadData(val) {
            const box = document.getElementById('rule-box');
            if(val === '999') {
                box.innerHTML = "<b>🚔 قوانين العساكر 999</b> • الالتزام بالزي الرسمي.<br>• يمنع استخدام القوة المفرطة بدون تحذير.<br>• احترام المواطنين واجب مقدس.";
            } else if(val === 'gang') {
                box.innerHTML = "<b>💀 قوانين الإجرام</b> • السطو يتطلب 4 عساكر.<br>• يمنع الهروب للمنطقة الآمنة أثناء المطاردة.<br>• الفدية بحد أقصى 50 ألف.";
            } else if(val === 'basic') {
                box.innerHTML = "<b>📜 القوانين العامة</b> • يمنع الـ RDM والـ VDM نهائياً.<br>• الالتزام بتقمص الشخصية (RP).<br>• يمنع السب والقذف (OOC).";
            } else {
                box.innerHTML = "يرجى اختيار قسم من المربع أعلاه لعرض القوانين بالتفصيل...";
            }
        }
    </script>
</body>
</html>
