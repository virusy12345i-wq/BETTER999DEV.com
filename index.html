<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoVaX RP | الدستور الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #8a2be2; --bg: #050505; --card: #0d0d0d; --text: #fff; --dim: #a0a0a0; --discord: #5865F2; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; overflow-x: hidden; }

        /* Navbar */
        .navbar { position: fixed; top: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 1000; }
        .logo { font-family: 'Orbitron'; color: var(--p); font-size: 1.8rem; font-weight: 900; }
        .login-btn { background: var(--discord); color: #fff; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 800; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }

        /* Sidebar */
        .sidebar { position: fixed; right: 0; top: 75px; width: 260px; height: calc(100vh - 75px); background: #080808; border-left: 1px solid #1a1a1a; padding: 30px 15px; transition: 0.3s; z-index: 999; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 15px; color: var(--dim); cursor: pointer; border-radius: 12px; margin-bottom: 8px; font-weight: 700; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(138, 43, 226, 0.1); color: #fff; border-right: 4px solid var(--p); }

        /* Main */
        main { margin-right: 260px; padding: 100px 30px 30px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        /* Components */
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 25px; border-radius: 15px; margin-bottom: 25px; }
        .select-box { width: 100%; padding: 15px; background: #151515; border: 1px solid var(--p); color: #fff; border-radius: 10px; font-family: 'Tajawal'; font-size: 1.1rem; cursor: pointer; margin-bottom: 20px; }
        .content-view { background: #080808; border: 1px solid #1a1a1a; padding: 25px; border-radius: 10px; line-height: 2; }
        .content-view ul { list-style: none; padding-right: 10px; }
        .content-view li { margin-bottom: 12px; position: relative; padding-right: 25px; color: var(--dim); }
        .content-view li::before { content: '✦'; color: var(--p); position: absolute; right: 0; }

        /* Form */
        input, select, textarea { width: 100%; padding: 12px; background: #151515; border: 1px solid #222; color: #fff; border-radius: 8px; margin: 10px 0 20px; font-family: 'Tajawal'; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 800; font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 992px) {
            .sidebar { right: -100%; width: 100%; }
            .sidebar.active { right: 0; }
            main { margin-right: 0; padding: 90px 15px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">NoVaX</div>
        <a href="#" class="login-btn"><i class="fa-brands fa-discord"></i> دخول بالديسكورد</a>
    </nav>

    <aside class="sidebar">
        <div class="nav-item active" onclick="tab('home', this)"><i class="fa-solid fa-house"></i> الرئيسية</div>
        <div class="nav-item" onclick="tab('rules', this)"><i class="fa-solid fa-scroll"></i> الدستور</div>
        <div class="nav-item" onclick="tab('apply', this)"><i class="fa-solid fa-pen-nib"></i> التقديم</div>
    </aside>

    <main>
        <div id="home" class="page active">
            <div class="card" style="text-align:center; padding: 60px 20px;">
                <h1 style="font-family:'Orbitron'; font-size: 2.5rem; color:var(--p);">NoVaX ROLEPLAY</h1>
                <p style="color:var(--dim); margin-top:15px;">بوابتك الرسمية لمراجعة القوانين والتقديم على الوظائف في مدينة النجف.</p>
            </div>
        </div>

        <div id="rules" class="page">
            <div class="card">
                <h2 style="margin-bottom:15px;">موسوعة القوانين</h2>
                <select class="select-box" onchange="showRules(this.value)">
                    <option value="">-- اختر القسم المُراد --</option>
                    <option value="gen">القوانين العامة (NLR / RDM)</option>
                    <option value="rob">السطو والرهائن</option>
                    <option value="pol">قوانين العساكر</option>
                </select>
                <div id="rules-display" class="content-view">
                    <p style="text-align:center; color:#555;">يرجى اختيار قسم من القائمة...</p>
                </div>
            </div>
        </div>

        <div id="apply" class="page">
            <div class="card">
                <h2>نموذج التقديم الرسمي</h2>
                <label>الاسم داخل اللعبة (IC):</label>
                <input type="text" placeholder="مثال: علي النجفي">
                <label>الوظيفة المطلوبة:</label>
                <select>
                    <option>الشرطة (Police)</option>
                    <option>الإسعاف (EMS)</option>
                    <option>الميكانيكي (Mechanic)</option>
                </select>
                <label>لماذا تريد الانضمام إلينا؟</label>
                <textarea rows="4" placeholder="اكتب نبذة هنا..."></textarea>
                <button class="btn">إرسال الطلب</button>
            </div>
        </div>
    </main>

    <script>
        function tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
        }

        function showRules(val) {
            const display = document.getElementById('rules-display');
            const data = {
                gen: "<h3>القوانين العامة</h3><ul><li>NLR: يمنع تذكر أحداث الوفاة لمدة 15 دقيقة.</li><li>RDM: يمنع القتل بدون سبب مقنع.</li><li>يمنع السب أو القذف أو التطاول (OOC).</li></ul>",
                rob: "<h3>السطو والرهائن</h3><ul><li>سوبر ماركت: 2 شرطة.</li><li>بنك مركزي: 4 شرطة.</li><li>فدية المواطن: 20,000$.</li></ul>",
                pol: "<h3>قوانين العساكر</h3><ul><li>الالتزام بالزي الرسمي والرتب.</li><li>يمنع سحب السلاح بدون سبب قاهر.</li></ul>"
            };
            display.innerHTML = data[val] || '<p style="text-align:center; color:#555;">يرجى اختيار قسم...</p>';
        }
    </script>
</body>
</html>
