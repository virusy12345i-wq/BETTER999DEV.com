<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESPECT CLONE | 2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f111a; font-family: 'Tajawal', sans-serif; color: #fff; }
        /* القائمة الجانبية بستايل ريسبكت */
        .sidebar { background: #161925; width: 260px; height: 100vh; position: fixed; right: 0; top: 0; border-left: 1px solid #1f2335; }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #8e94a5; transition: 0.3s; margin: 5px 15px; border-radius: 12px; }
        .nav-item:hover, .nav-item.active { background: #232738; color: #3b82f6; }
        .nav-item.active { border-right: 3px solid #3b82f6; }
        
        /* المحتوى الرئيسي */
        .main-content { margin-right: 260px; padding: 40px; }
        .card { background: #161925; border-radius: 20px; border: 1px solid #1f2335; padding: 25px; transition: 0.3s; }
        .card:hover { border-color: #3b82f6; }
        
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside class="sidebar shadow-2xl">
        <div class="p-8 text-center border-b border-white/5 mb-6">
            <h1 class="text-2xl font-black italic tracking-widest text-blue-500">2099<span class="text-white">RP</span></h1>
        </div>
        
        <nav>
            <div onclick="showTab('home')" id="tab-home" class="nav-item active"><span>🏠</span> الرئيسية</div>
            <div onclick="showTab('store')" id="tab-store" class="nav-item"><span>🛒</span> المتجر</div>
            <div onclick="showTab('rules')" id="tab-rules" class="nav-item"><span>📋</span> القوانين</div>
            <div onclick="showTab('apply')" id="tab-apply" class="nav-item"><span>✍️</span> التقديمات</div>
            <div onclick="showTab('admin')" id="tab-admin" class="nav-item text-red-500/60"><span>⚙️</span> الإدارة</div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="flex justify-between items-center mb-10">
            <h2 id="current-title" class="text-3xl font-bold">لوحة التحكم</h2>
            <div class="flex items-center gap-4 bg-[#161925] p-2 pr-6 rounded-2xl border border-white/5">
                <span class="text-sm text-gray-400">سيرفر 2099 أونلاين</span>
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            </div>
        </div>

        <div id="home" class="page active">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card bg-gradient-to-l from-blue-900/10 to-transparent">
                    <h3 class="text-xl font-bold mb-3">مرحباً بك في مدينة 2099</h3>
                    <p class="text-gray-400 text-sm mb-6">هذا الموقع مصمم لخدمتك وتوفير أفضل تجربة رول بلاي. يمكنك التقديم على الوايت لست أو شراء الإضافات من المتجر.</p>
                    <button class="bg-blue-600 px-6 py-3 rounded-xl font-bold text-sm">ابدأ الرحلة</button>
                </div>
                <div class="card flex flex-col justify-center items-center">
                    <p class="text-gray-500 uppercase text-xs tracking-widest mb-2">عدد اللاعبين</p>
                    <p class="text-5xl font-black text-blue-500">150</p>
                </div>
            </div>
        </div>

        <div id="store" class="page">
            <div id="shop-items" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </div>
        
        </main>

    <script>
        function showTab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-'+id).classList.add('active');
            
            const titles = { home: 'الرئيسية', store: 'المتجر الرقمي', rules: 'القوانين', apply: 'التقديمات', admin: 'الإدارة' };
            document.getElementById('current-title').innerText = titles[id];
        }
    </script>
</body>
</html>
