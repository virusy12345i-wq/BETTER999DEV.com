<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respect RP | دستور مدينة ريسبكت</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #8a2be2; --a: #ac15fe; --bg: #030303; --c: #0b0b0b; --b: #1c1c1c; --t: #ffffff; --m: #999999; --s: cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--t); line-height: 1.8; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* [1] NAVIGATION */
        nav { position: fixed; top: 0; width: 100%; height: 75px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--b); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; z-index: 9999; }
        .l { font-weight: 900; font-size: 26px; color: var(--p); letter-spacing: 2px; }
        .d-l { background-color: #5865F2; color: #fff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 800; font-size: 14px; transition: 0.3s var(--s); display: flex; align-items: center; gap: 10px; border: none; cursor: pointer; }
        .d-l:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5); }

        /* [2] SIDEBAR & MAIN WRAPPER */
        .wrapper { display: flex; margin-top: 75px; min-height: calc(100vh - 75px); }
        .sidebar { width: 280px; background: #050505; border-left: 1px solid var(--b); padding: 30px 15px; position: fixed; right: 0; height: 100%; overflow-y: auto; z-index: 999; scrollbar-width: none; }
        .sidebar::-webkit-scrollbar { display: none; }
        .n-l { display: flex; align-items: center; gap: 14px; padding: 16px 20px; color: var(--m); text-decoration: none; border-radius: 10px; margin-bottom: 10px; transition: 0.3s var(--s); font-weight: 800; font-size: 15px; cursor: pointer; }
        .n-l i { font-size: 16px; color: var(--p); opacity: 0.6; }
        .n-l:hover, .n-l.active { background: rgba(138, 43, 226, 0.12); color: var(--t); border: 1px solid rgba(138, 43, 226, 0.2); }
        .n-l.active i { opacity: 1; color: var(--a); }

        main { margin-right: 280px; width: calc(100% - 280px); padding: 50px 40px; }
        .hero { text-align: center; margin-bottom: 60px; animation: fadeIn 0.8s ease; }
        .hero h1 { font-size: 48px; font-weight: 900; margin-bottom: 10px; color: #fff; }
        .hero p { color: var(--m); font-size: 18px; }

        /* [3] RULES CONTAINER */
        .s-c { display: none; animation: slideUp 0.5s ease; }
        .s-c.active { display: block; }
        .rule-card { background: var(--c); border: 1px solid var(--b); border-radius: 14px; margin-bottom: 16px; overflow: hidden; transition: 0.3s var(--s); }
        .rule-card:hover { border-color: var(--p); box-shadow: 0 5px 20px rgba(138, 43, 226, 0.1); }
        
        .rule-h { width: 100%; padding: 22px 28px; background: none; border: none; color: #fff; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 16px; font-weight: 800; text-align: right; }
        .rule-h .fa-chevron-down { font-size: 13px; color: #444; transition: 0.4s var(--s); }
        
        .rule-b { max-height: 0; overflow: hidden; transition: 0.4s var(--s); background: rgba(0,0,0,0.1); }
        .rule-card.open .rule-b { max-height: 1000px; padding: 25px; border-top: 1px solid var(--b); color: var(--m); font-size: 15px; }
        .rule-card.open .fa-chevron-down { transform: rotate(180deg); color: var(--p); }

        /* FOOTER */
        footer { margin-top: 60px; text-align: center; color: #333; font-size: 12px; font-weight: 700; }

        /* ANIMATIONS */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* [4] MOBILE RESPONSIVE */
        @media (max-width: 992px) {
            nav { padding: 0 20px; }
            .sidebar { width: 100%; height: auto; position: relative; top: 0; border-left: none; border-bottom: 1px solid var(--b); display: flex; overflow-x: auto; padding: 12px 10px; scroll-snap-type: x mandatory; }
            .n-l { margin-bottom: 0; white-space: nowrap; padding: 10px 18px; font-size: 13px; flex-shrink: 0; scroll-snap-align: start; }
            main { margin-right: 0; width: 100%; padding: 30px 20px; }
            .hero h1 { font-size: 32px; }
            .rule-h { font-size: 14px; padding: 18px 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="l">RESPECT</div>
        <a href="#" class="d-l"><i class="fa-brands fa-discord"></i> دخول العساكر</a>
    </nav>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="n-l active" onclick="t('gen', this)"><i class="fa-solid fa-book-open"></i> الدستور العام</div>
            <div class="n-l" onclick="t('pol', this)"><i class="fa-solid fa-shield-halved"></i> قوانين الجهات</div>
            <div class="n-l" onclick="t('genrl', this)"><i class="fa-solid fa-gavel"></i> القوانين العامة</div>
            <div class="n-l" onclick="t('crm', this)"><i class="fa-solid fa-skull"></i> قوانين الإجرام</div>
        </aside>

        <main>
            <div class="hero">
                <h1>CONSTITUTION</h1>
                <p>الدستور الرسمي لمدينة ريسبكت رول بلاي</p>
            </div>

            <div id="gen" class="s-c active">
                <div class="rule-card">
                    <button class="rule-h" onclick="k(this)">الفصل الأول: القواعد الأساسية <i class="fa-solid fa-chevron-down"></i></button>
                    <div class="rule-b">هنا تكتب القوانين الأساسية..</div>
                </div>
                <div class="rule-card">
                    <button class="rule-h" onclick="k(this)">الفصل الثاني: حقوق المواطنين <i class="fa-solid fa-chevron-down"></i></button>
                    <div class="rule-b">هنا تكتب قوانين الحقوق..</div>
                </div>
            </div>

            <div id="pol" class="s-c">
                <div class="rule-card">
                    <button class="rule-h" onclick="k(this)">قوانين الشرطة (999) <i class="fa-solid fa-chevron-down"></i></button>
                    <div class="rule-b">قوانين العساكر بالتفصيل هنا..</div>
                </div>
            </div>

            <footer>RESPECT ROLEPLAY © 2026</footer>
        </main>
    </div>

    <script>
        // نظام الـ Accordion لفتح وإغلاق القوانين بسلاسة
        function k(b) {
            const card = b.parentElement;
            const openCard = document.querySelector('.rule-card.open');
            if(openCard && openCard !== card) openCard.classList.remove('open');
            card.classList.toggle('open');
        }

        // نظام التبديل بين الأقسام الرئيسية
        function t(id, el) {
            document.querySelectorAll('.s-c').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.n-l').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            if (window.innerWidth < 992) window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
